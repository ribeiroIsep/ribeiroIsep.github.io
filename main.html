<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/webstorm-icon-logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Main</title>
  <link rel="stylesheet" href="/style.css">
</head>


<body>
    <div class="main-container">

        <header class="navBar">
            <div class="container">
                <nav>
                    <ul class="nav-links">
                        <div id="logo">Car APP</div>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="#">Contact</a></li>
                        <li><a href="about.html">About</a></li>
                        <div class="container-login">
                            <button id="create-car-button" class="button-nav-create">Create Car</button>
                            <button id="logOut" class="button-nav-log">Log Out</button>
                        </div>
                    </ul>
                    <div class="burger">
                        <div class="line1"></div>
                        <div class="line2"></div>
                        <div class="line3"></div>
                    </div>
                </nav>
            </div>
        </header>

        <main id="app">

          <h1 class="title2">
            Hello Admin! <br /> Welcome to the Main Car Page!
          </h1>

          <div id="car-list" class="car-grid">
            <!-- Os cards dos carros serão inseridos aqui pelo JavaScript -->
            <p id="loading-message">Loading cars...</p>
          </div>

          <div id="create-car-overlay" class="modal-overlay">
            <div class="create-car-form-container">
              <button id="close-modal-button" class="close-button">&times;</button>
              <h2>Add new car</h2>
              <form id="create-car-form">
                <label for="brand">Brand:</label>
                <input type="text" id="brand" name="brand" required>

                <label for="model">Model:</label>
                <input type="text" id="model" name="model" required>

                <label for="cc">Cc:</label>
                <input type="number" id="cc" name="cc" required>

                <label for="hp">HorsePower:</label>
                <input type="number" id="hp" name="horsePower" required>

                <label for="info">Info:</label>
                <input type="text" id="info" name="info" required>

                <label for="image">Imagem (Opcional):</label>
                <input type="file" id="image" name="image" accept="image/*">

                <button type="submit" class="submit-button">Add Car</button>
              </form>
              <div id="form-message" style="color: red; margin-top: 10px;"></div>
            </div>
          </div>

        </main>
        <footer class="technologies">
          <img src="/technologies.svg" alt="List of supported technologies">
        </footer>
    </div>


    <script type="module" src="/src/fetch.js"></script>

</body>
</html>
