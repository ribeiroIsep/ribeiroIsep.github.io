<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/webstorm-icon-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
<main id="app">

    <header class="navBar">
        <div class="container">
            <nav>
                <ul class="nav-links">
                    <div id="logo">Car APP</div>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Sign Up</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">About</a></li>
                    <div class="container-login">
                        <button id="sign" type="button signUp">Sign Up</button>
                    </div>
                </ul>
                <div class="burger">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
            </nav>
        </div>
    </header>

    <h1 class="title2">
        Hello Stranger :) <br /> Welcome to the Login Page!
    </h1>

    <form class="login-form" id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="pass">Password</label>
        <input type="password" id="pass" name="pass" required><br><br>
        <button type="submit" class="submit-button">Login</button>
        <div id="errorMessage" style="color: red; margin-top: 10px;"></div>
    </form>

</main>
<footer class="technologies">
    <img src="/technologies.svg" alt="List of supported technologies">
</footer>

<script type="module" src="/src/login.js"></script>

</body>
</html>
